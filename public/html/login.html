<!DOCTYPE html>
<html lang="nl">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDS Facturen | Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#070b18;color:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.wrap{width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-cds{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#fff;letter-spacing:-1px;}
.logo-cds .dot{color:#2456ff;}
.logo-sub{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,244,255,0.4);text-transform:uppercase;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(240,244,255,0.13);border-radius:16px;padding:32px;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:#fff;margin-bottom:4px;}
.card-sub{font-size:13px;color:rgba(240,244,255,0.45);margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:12px;font-weight:500;color:rgba(240,244,255,0.45);}
.field-header{display:flex;justify-content:space-between;align-items:center;}
.field input{background:rgba(255,255,255,0.05);border:0.5px solid rgba(240,244,255,0.13);border-radius:8px;padding:10px 12px;font-size:13px;color:#f0f4ff;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s,background .15s;width:100%;}
.field input:focus{border-color:rgba(36,86,255,0.5);background:rgba(36,86,255,0.06);}
.field input::placeholder{color:rgba(240,244,255,0.25);}
.forgot{font-size:12px;color:#4f7aff;text-decoration:none;}
.forgot:hover{color:#2456ff;}
.error{background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px 12px;font-size:12.5px;color:#f87171;margin-bottom:16px;display:none;}
.btn-primary{width:100%;background:#2456ff;color:#fff;border:none;border-radius:8px;padding:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.btn-primary:hover{opacity:0.85;}
.btn-primary:disabled{opacity:0.6;}
.footer{text-align:center;font-size:13px;color:rgba(240,244,255,0.4);margin-top:20px;}
.footer a{color:#4f7aff;text-decoration:none;}
.footer a:hover{color:#2456ff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-cds">CDS<span class="dot">·</span></div>
    <div class="logo-sub">Facturen</div>
  </div>
  <div class="card">
    <div class="card-title">Welkom terug</div>
    <div class="card-sub">Log in op uw account</div>
    <div class="error" id="error">Ongeldig e-mailadres of wachtwoord</div>
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>E-mailadres</label>
        <input type="email" id="email" placeholder="naam@bedrijf.nl" required>
      </div>
      <div class="field">
        <div class="field-header">
          <label>Wachtwoord</label>
          <a href="#" class="forgot">Vergeten?</a>
        </div>
        <input type="password" id="wachtwoord" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="btn">Inloggen</button>
    </form>
  </div>
  <div class="footer">
    Nog geen account? <a href="/register">Gratis aanmaken</a>
  </div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  btn.textContent = 'Inloggen...';
  btn.disabled = true;
  // Tijdelijk: direct doorsturen naar dashboard
  setTimeout(() => { window.location.href = '/dashboard'; }, 800);
}
</script>
</body>
</html>
